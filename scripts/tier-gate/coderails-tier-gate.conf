# newsyslog configuration for the coderails tier-gate daemon log.
# Installed to /etc/newsyslog.d/coderails-tier-gate.conf by scripts/tier-gate/install.sh.
# newsyslog(8) runs from a system launchd job and rotates matching logs.
#
# Fields: logfilename          [owner:group]  mode  count  size  when  flags
#   mode  0644  — root-owned log, world-readable.
#   count 5     — keep 5 archived generations (…​.0.gz … .4.gz).
#   size  1024  — rotate when the log reaches 1024 KB (1 MB). newsyslog's size
#                 column is KILOBYTES, so 1 MB = 1024, not 1048576.
#   when  *     — size-triggered only (no time-of-day rotation).
#   flags Z     — gzip-compress each rotated generation.
#
# The heartbeat added in Fix 4 (one tick line per StartInterval) grows this log
# faster than before, so bounding it is required, not optional.
/var/log/coderails-tier-gate.log		644  5  1024  *  Z
